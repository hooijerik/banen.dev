server {
    listen 80;
    listen [::]:80;
    server_name banen.dev www.banen.dev;

    # Iets grotere uploads/headers toestaan
    client_max_body_size 2m;

    # Own upstream port (shared VPS: 3000/3001/3002 taken) - must match PORT in banendev.service
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# LET OP: .dev staat op de HSTS-preloadlijst, dus HTTPS is VERPLICHT - browsers weigeren
# http. Draai `certbot --nginx -d banen.dev -d www.banen.dev` zodat Certbot het 443/SSL-block
# en de http->https redirect automatisch toevoegt (Let's Encrypt).
